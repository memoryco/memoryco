# memoryco release workflow
#
# Builds pre-compiled binaries for all supported platforms and creates
# a GitHub Release with checksums. The source is pulled from the appropriate
# private repo using a deploy key.
#
# Supports three binaries with independent release cadence:
#   memoryco        - Core memory MCP server
#   memoryco_fs     - Filesystem MCP server
#   memoryco_agents - Agent spawner MCP server
#
# Trigger: push a binary-prefixed tag:
#   git tag memoryco-v1.0.0        && git push origin memoryco-v1.0.0
#   git tag memoryco_fs-v1.0.0     && git push origin memoryco_fs-v1.0.0
#   git tag memoryco_agents-v0.2.1 && git push origin memoryco_agents-v0.2.1
#
# Required secrets:
#   MEMORYCO_APP_ID          - GitHub App ID (org-level)
#   MEMORYCO_APP_PRIVATE_KEY - GitHub App private key (PEM)

name: Release

on:
  push:
    tags:
      - "memoryco-v*"
      - "memoryco_fs-v*"
      - "memoryco_agents-v*"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      binary_name:
        description: "Binary name (memoryco, memoryco_fs, or memoryco_agents)"
        required: true
        default: "memoryco"
      version:
        description: "Version (e.g., v1.0.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

permissions:
  contents: write  # needed to create releases

jobs:
  # ─── Determine build parameters ─────────────────────────────────────────────
  #
  # Parse the tag (or workflow_dispatch inputs) to determine which binary to
  # build and what version to tag it. All downstream jobs consume these outputs.
  determine:
    name: Determine Build Parameters
    runs-on: ubuntu-latest

    outputs:
      binary_name: ${{ steps.parse.outputs.binary_name }}
      version:     ${{ steps.parse.outputs.version }}
      tag:         ${{ steps.parse.outputs.tag }}

    steps:
      - name: Parse tag / inputs
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BINARY="${{ github.event.inputs.binary_name }}"
            # Normalise: ensure version starts with v
            VERSION="v${{ github.event.inputs.version }}"
            VERSION="v${VERSION#v}"
            TAG="${BINARY}-${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            # Strip the -v{semver} suffix to get binary name.
            # Works for memoryco, memoryco_fs, memoryco_agents because none
            # of the names themselves contain a -v sequence.
            BINARY="${TAG%-v*}"
            # Extract the version part and re-prefix with v
            VERSION="v${TAG##*-v}"
          fi

          echo "binary_name=${BINARY}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"

          echo "Binary : ${BINARY}"
          echo "Version: ${VERSION}"
          echo "Tag    : ${TAG}"

  # ─── Build matrix ───────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: determine
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    env:
      BINARY_NAME: ${{ needs.determine.outputs.binary_name }}
      VERSION:     ${{ needs.determine.outputs.version }}

    steps:
      - name: Checkout dist repo
        uses: actions/checkout@v4

      # Generate a short-lived GitHub App installation token that grants
      # read access to all private repos in the MemoryCo org. This replaces
      # per-repo deploy keys — one token covers source repos, the design
      # crate git dep, and any future private dependencies.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MEMORYCO_APP_ID }}
          private-key: ${{ secrets.MEMORYCO_APP_PRIVATE_KEY }}
          owner: memoryco

      # Rewrite all github.com URLs to use the App token over HTTPS.
      # This covers:
      #   - Explicit git clones (source repos, path deps)
      #   - Cargo's implicit fetch of private git deps (e.g. memoryco_design)
      #   - Both SSH and HTTPS URL styles
      - name: Configure git auth for private repos
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      # Map binary name → source repo
      - name: Clone source
        run: |
          case "$BINARY_NAME" in
            memoryco)        REPO="MemoryCo/memory" ;;
            memoryco_fs)     REPO="MemoryCo/filesystem" ;;
            memoryco_agents) REPO="MemoryCo/agents" ;;
          esac
          git clone --depth 1 "https://github.com/${REPO}.git" source

      # Clone path dependencies that live in sibling repos.
      # All clones go through the App token's HTTPS rewrite automatically,
      # so both public and private repos just work.
      - name: Clone path dependencies
        run: |
          git clone --depth 1 https://github.com/MemoryCo/updater.git updater
          git clone --depth 1 https://github.com/MemoryCo/llm.git llm

      - name: Clone sml_mcps (agents only)
        if: needs.determine.outputs.binary_name == 'memoryco_agents'
        run: |
          git clone --depth 1 https://github.com/MemoryCo/sml_mcps.git sml_mcps

      # Rewrite any SSH git deps in Cargo.toml to use HTTPS + App token.
      # This is more reliable than git insteadOf in CI where checkout@v4
      # may interfere with global git config.
      - name: Rewrite private git deps to HTTPS
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          for f in source/Cargo.toml source/Cargo.lock; do
            if [ -f "$f" ]; then
              sed -i.bak "s|ssh://git@github.com/|https://x-access-token:${TOKEN}@github.com/|g" "$f"
              rm -f "${f}.bak"
            fi
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies for native builds
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

      - name: Build
        working-directory: source
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          TARGET="${{ matrix.target }}"
          ARCHIVE="${BINARY_NAME}-${VERSION}-${TARGET}.tar.gz"

          BIN="source/target/${TARGET}/release/${BINARY_NAME}"

          if [ ! -f "$BIN" ]; then
            echo "ERROR: Binary not found at $BIN"
            ls -la "source/target/${TARGET}/release/" || true
            exit 1
          fi

          cp "$BIN" "${BINARY_NAME}"
          chmod +x "${BINARY_NAME}"

          # Create archive
          tar czf "$ARCHIVE" "$BINARY_NAME"

          # Generate per-target checksum
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi

          echo "archive=${ARCHIVE}"       >> "$GITHUB_ENV"
          echo "checksum=${ARCHIVE}.sha256" >> "$GITHUB_ENV"

          echo "=== Package ==="
          echo "Archive: $ARCHIVE"
          ls -lh "$ARCHIVE"
          cat "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.archive }}
            ${{ env.checksum }}
          if-no-files-found: error

  # ─── Create release ─────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [determine, build]
    runs-on: ubuntu-latest

    env:
      BINARY_NAME: ${{ needs.determine.outputs.binary_name }}
      VERSION:     ${{ needs.determine.outputs.version }}

    steps:
      - name: Checkout dist repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release

          # Move all archives and individual checksums into release/
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec mv {} release/ \;

          # Create combined checksums file from per-target checksums
          cd release
          cat *.sha256 > "${BINARY_NAME}-${VERSION}-checksums.sha256"

          # Clean up the individual per-target checksum files
          find . -name "*.tar.gz.sha256" -delete

          # Include the relevant install script as a release asset
          case "$BINARY_NAME" in
            memoryco)
              cp "${GITHUB_WORKSPACE}/install.sh" .
              echo "INSTALL_CMD=curl -fsSL https://memoryco.ai/install.sh | sh" >> "$GITHUB_ENV"
              ;;
            memoryco_fs)
              cp "${GITHUB_WORKSPACE}/install_fs.sh" .
              echo "INSTALL_CMD=curl -fsSL https://memoryco.ai/install_fs.sh | sh" >> "$GITHUB_ENV"
              ;;
            memoryco_agents)
              cp "${GITHUB_WORKSPACE}/install_agents.sh" .
              echo "INSTALL_CMD=curl -fsSL https://memoryco.ai/install_agents.sh | sh" >> "$GITHUB_ENV"
              ;;
          esac

          echo "=== Release files ==="
          ls -lh
          echo ""
          echo "=== Checksums ==="
          cat "${BINARY_NAME}-${VERSION}-checksums.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ needs.determine.outputs.tag }}
          name:      "${{ needs.determine.outputs.binary_name }} ${{ needs.determine.outputs.version }}"
          draft:     false
          prerelease: ${{ contains(needs.determine.outputs.version, '-') }}
          generate_release_notes: false
          body: |
            ## ${{ needs.determine.outputs.binary_name }} ${{ needs.determine.outputs.version }}

            ### Install

            ```bash
            ${{ env.INSTALL_CMD }}
            ```

            Or download the binary for your platform below.

            ### Checksums

            Verify your download:
            ```bash
            sha256sum -c ${{ needs.determine.outputs.binary_name }}-${{ needs.determine.outputs.version }}-checksums.sha256
            ```

            ### What's new

            See [memoryco.ai](https://memoryco.ai) for details.
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
